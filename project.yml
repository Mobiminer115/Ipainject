name: IPAPayloadLab

options:
  minimumXcodeGenVersion: 2.45.4
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    DEAD_CODE_STRIPPING: YES

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    exactVersion: 0.9.20
  SWCompression:
    url: https://github.com/tsolomko/SWCompression.git
    # 4.9.x requires iOS 17. Keep 4.8.7 so this iOS 16 target can build.
    exactVersion: 4.8.7

targets:
  ForgeCore:
    type: framework
    platform: iOS
    sources:
      - path: Sources/ForgeCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.local.IPAPayloadLab.ForgeCore
        PRODUCT_NAME: ForgeCore
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: YES

  IPAPayloadLab:
    type: application
    platform: iOS
    sources:
      - path: Sources/IPAPayloadLab
      - path: Resources
        buildPhase: resources
    dependencies:
      - target: ForgeCore
      - package: ZIPFoundation
      - package: SWCompression
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.local.IPAPayloadLab
        PRODUCT_NAME: IPAPayloadLab
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/IPAPayloadLab/Info.plist

  ForgeCoreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/ForgeCoreTests
    dependencies:
      - target: ForgeCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.local.IPAPayloadLab.ForgeCoreTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  IPAPayloadLab:
    build:
      targets:
        IPAPayloadLab: all
        ForgeCore: all
        ForgeCoreTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - name: ForgeCoreTests
          parallelizable: true
    run:
      config: Debug
    archive:
      config: Release
